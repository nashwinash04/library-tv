<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Library TV</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Fullscreen player */
#player {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}

/* TV overlay UI */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  color: white;
  z-index: 2;
  padding: 20px;
  pointer-events: none;
}

/* Top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  opacity: 0.8;
}

/* Channel badge */
.channel {
  background: rgba(0,0,0,0.5);
  padding: 6px 10px;
  border-radius: 6px;
}

/* Next button */
button {
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 3;
  padding: 12px 18px;
  font-size: 16px;
  background: white;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}

button:hover {
  background: #ddd;
}
</style>
</head>

<body>

<div id="player"></div>

<div class="overlay">
  <div class="topbar">
    <div class="channel">📺 LIBRARY TV</div>
    <div id="nowPlaying">Loading...</div>
  </div>
</div>

<button onclick="nextVideo()">Next ▶</button>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const channelId = "UC_O58Rr2DOskJvs9bArpLkQ"; // Library of Letourneau

let videos = [];
let player;

// Fetch uploads from channel
async function loadVideos() {
  const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss));
  const data = await res.json();

  videos = data.items.map(item => item.link.split("v=")[1]);

  startPlayer();
}

// Pick random video
function randomVideo() {
  return videos[Math.floor(Math.random() * videos.length)];
}

// Start YouTube player
function startPlayer() {
  player = new YT.Player("player", {
    videoId: randomVideo(),
    playerVars: {
      autoplay: 1,
      controls: 1,
      rel: 0,
      modestbranding: 1
    },
    events: {
      onStateChange: onStateChange
    }
  });

  updateNowPlaying();
}

// When video ends → auto next
function onStateChange(event) {
  if (event.data === 0) {
    nextVideo();
  }
}

// Next button
function nextVideo() {
  const vid = randomVideo();
  player.loadVideoById(vid);
  updateNowPlaying();
}

// Update TV overlay text
function updateNowPlaying() {
  const vid = player.getVideoData().video_id;
  document.getElementById("nowPlaying").innerText =
    "Now Playing: " + vid;
}

// YouTube API ready
function onYouTubeIframeAPIReady() {
  loadVideos();
}
</script>

</body>
</html>
