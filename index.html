<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>CRT TV</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

/* CRT screen */
.crt {
  position: fixed;
  inset: 0;
}

/* YouTube player */
#player {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  filter: contrast(1.25) saturate(1.4) brightness(0.85);
}

/* scanlines */
.crt::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.18),
    rgba(0,0,0,0.18) 1px,
    rgba(255,255,255,0.02) 2px
  );
  pointer-events: none;
}

/* vignette */
.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse at center,
    rgba(0,0,0,0) 40%,
    rgba(0,0,0,0.75) 100%
  );
  pointer-events: none;
}

/* ONLY TEXT */
.now {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #00ff99;
  font-size: 14px;
  text-shadow: 0 0 10px #00ff99;
  z-index: 10;
}

/* RETRO REMOTE */
.remote {
  position: fixed;
  bottom: 40px;
  right: 40px;
  width: 70px;
  height: 70px;
  background: #111;
  border: 2px solid #00ff99;
  z-index: 20;
  overflow: hidden;
  transition: 0.2s;
}

.remote:hover {
  width: 220px;
  height: 260px;
}

.controls {
  opacity: 0;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: 0.2s;
}

.remote:hover .controls {
  opacity: 1;
}

button {
  background: black;
  color: #00ff99;
  border: 1px solid #00ff99;
  font-family: monospace;
  padding: 6px;
  cursor: pointer;
}

button:hover {
  background: #00ff99;
  color: black;
}
</style>
</head>

<body>

<div class="crt">
  <div id="player"></div>
</div>

<div class="now" id="now">LOADING...</div>

<div class="remote">
  <div class="controls">
    <button onclick="prevVideo()">⏮ Prev</button>
    <button onclick="togglePlay()">⏯ Play/Pause</button>
    <button onclick="nextVideo()">⏭ Next</button>
    <button onclick="toggleMute()">🔊 Mute</button>

    <hr style="border:0;border-top:1px solid #00ff99;opacity:0.3">

    <button onclick="setChannel(0)">Channel 1</button>
    <button onclick="setChannel(1)">Channel 2</button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* ---------------- CHANNELS ---------------- */
const channels = [
  "UC_O58Rr2DOskJvs9bArpLkQ", // Library of Letourneau
  "UC_x5XG1OV2P6uZZ5FSM9Ttw"  // sample backup channel
];

let player;
let videos = [];
let index = 0;
let currentChannel = 0;

/* ---------------- SHUFFLE ---------------- */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---------------- LOAD CHANNEL ---------------- */
async function loadChannel(i) {
  currentChannel = i;

  const rss =
    `https://www.youtube.com/feeds/videos.xml?channel_id=${channels[i]}`;

  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" +
    encodeURIComponent(rss)
  );

  const data = await res.json();

  videos = shuffle(
    data.items.map(v => v.link.split("v=")[1])
  );

  index = 0;

  playNext();
}

/* ---------------- PLAYER READY ---------------- */
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    videoId: "",
    playerVars: {
      autoplay: 1,
      controls: 1,
      rel: 0,
      modestbranding: 1,
      mute: 1
    },
    events: {
      onReady: () => loadChannel(0),
      onStateChange: onState
    }
  });
}

/* ---------------- PLAY NEXT (FIXED) ---------------- */
function playNext() {
  if (index >= videos.length) {
    videos = shuffle(videos);
    index = 0;
  }

  const vid = videos[index++];
  player.loadVideoById(vid);

  document.getElementById("now").innerText =
    "NOW PLAYING: " + vid;
}

/* ---------------- CONTROLS ---------------- */
function nextVideo() {
  playNext();
}

function prevVideo() {
  index = Math.max(0, index - 2);
  playNext();
}

function togglePlay() {
  const state = player.getPlayerState();
  if (state === 1) player.pauseVideo();
  else player.playVideo();
}

function toggleMute() {
  if (player.isMuted()) player.unMute();
  else player.mute();
}

/* ---------------- CHANNEL SWITCH ---------------- */
function setChannel(i) {
  loadChannel(i);
}

/* ---------------- AUTO NEXT ---------------- */
function onState(e) {
  if (e.data === 0) {
    playNext();
  }
}
</script>

</body>
</html>
