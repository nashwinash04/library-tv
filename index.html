<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Retro TV</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

/* CRT screen effect wrapper */
.crt {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: black;
}

/* YouTube player */
#player {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  filter:
    contrast(1.2)
    saturate(1.3)
    brightness(0.9)
    blur(0.2px);
  z-index: 1;
}

/* Scanlines */
.crt::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.15) 1px,
    rgba(255,255,255,0.02) 2px
  );
  pointer-events: none;
  z-index: 2;
  animation: flicker 0.15s infinite;
}

/* subtle flicker */
@keyframes flicker {
  0% { opacity: 0.95; }
  50% { opacity: 1; }
  100% { opacity: 0.96; }
}

/* vignette */
.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse at center,
    rgba(0,0,0,0) 40%,
    rgba(0,0,0,0.6) 100%
  );
  z-index: 3;
  pointer-events: none;
}

/* HUD overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 4;
  color: #00ff99;
  padding: 15px;
  text-shadow: 0 0 10px #00ff99;
  pointer-events: none;
}

/* top bar */
.top {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

/* buttons */
button {
  position: fixed;
  bottom: 25px;
  right: 25px;
  z-index: 5;
  background: black;
  color: #00ff99;
  border: 1px solid #00ff99;
  padding: 10px 15px;
  cursor: pointer;
  font-family: monospace;
  text-shadow: 0 0 5px #00ff99;
}

button:hover {
  background: #00ff99;
  color: black;
}
</style>
</head>

<body>

<div class="crt">
  <div id="player"></div>
</div>

<div class="overlay">
  <div class="top">
    <div>📺 RETRO TV CHANNEL</div>
    <div id="now">LOADING...</div>
  </div>
</div>

<button onclick="nextVideo()">NEXT ▶</button>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const channelId = "UC_O58Rr2DOskJvs9bArpLkQ";

let videos = [];
let player;

// fetch channel uploads
async function loadVideos() {
  const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss));
  const data = await res.json();

  videos = data.items.map(v => v.link.split("v=")[1]);

  startPlayer();
}

// random video
function rand() {
  return videos[Math.floor(Math.random() * videos.length)];
}

// start player
function startPlayer() {
  player = new YT.Player("player", {
    videoId: rand(),
    playerVars: {
      autoplay: 1,
      controls: 1,
      rel: 0,
      modestbranding: 1,
      mute: 1
    },
    events: {
      onStateChange: onState
    }
  });

  updateHUD();
}

// when video ends
function onState(e) {
  if (e.data === 0) {
    nextVideo();
  }
}

// next video button
function nextVideo() {
  const vid = rand();
  player.loadVideoById(vid);
  updateHUD();
}

// HUD update
function updateHUD() {
  setTimeout(() => {
    try {
      document.getElementById("now").innerText =
        "PLAYING: " + player.getVideoData().video_id;
    } catch {}
  }, 500);
}

// API ready
function onYouTubeIframeAPIReady() {
  loadVideos();
}
</script>

</body>
</html>
