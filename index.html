<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>CRT TV</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

#player {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  filter: contrast(1.3) saturate(1.4) brightness(0.85);
}

.now {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #00ff99;
  font-size: 14px;
  text-shadow: 0 0 10px #00ff99;
}

.remote {
  position: fixed;
  bottom: 40px;
  right: 40px;
  width: 70px;
  height: 70px;
  background: #111;
  border: 2px solid #00ff99;
  overflow: hidden;
  transition: 0.2s;
}

.remote:hover {
  width: 220px;
  height: 260px;
}

.controls {
  opacity: 0;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.remote:hover .controls {
  opacity: 1;
}

button {
  background: black;
  color: #00ff99;
  border: 1px solid #00ff99;
  font-family: monospace;
  padding: 6px;
}
</style>
</head>

<body>

<div id="player"></div>
<div class="now" id="now">LOADING FULL CHANNEL...</div>

<div class="remote">
  <div class="controls">
    <button onclick="nextVideo()">NEXT</button>
    <button onclick="togglePlay()">PLAY/PAUSE</button>
    <button onclick="toggleMute()">MUTE</button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY"; // REQUIRED
const CHANNEL_ID = "UC_O58Rr2DOskJvs9bArpLkQ";

let player;
let videos = [];
let history = [];

/* ---------------- FETCH ALL VIDEOS (PAGINATED) ---------------- */
async function loadAllVideos(pageToken = "") {
  const url =
    `https://www.googleapis.com/youtube/v3/search?` +
    `key=${AIzaSyCX5hQvyCrd3-Y7TK6G2xuOcNi667EGg1Y}` + 
    `&channelId=${CHANNEL_ID}` +
    `&part=id&order=date&maxResults=50&pageToken=${pageToken}`;

  const res = await fetch(url);
  const data = await res.json();

  data.items.forEach(v => {
    if (v.id.videoId) videos.push(v.id.videoId);
  });

  if (data.nextPageToken) {
    await loadAllVideos(data.nextPageToken);
  }
}

/* ---------------- TRUE RANDOM ---------------- */
function getRandomVideo() {
  let pool = videos.filter(v => !history.includes(v));

  if (pool.length === 0) {
    history = [];
    pool = [...videos];
  }

  const pick = pool[Math.floor(Math.random() * pool.length)];
  history.push(pick);

  if (history.length > 15) history.shift();

  return pick;
}

/* ---------------- PLAYER ---------------- */
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    videoId: "",
    playerVars: {
      autoplay: 1,
      controls: 1,
      mute: 1
    },
    events: {
      onReady: async () => {
        await loadAllVideos();
        playNext();
      },
      onStateChange: e => {
        if (e.data === 0) playNext();
      }
    }
  });
}

/* ---------------- PLAY ---------------- */
function playNext() {
  const vid = getRandomVideo();
  player.loadVideoById(vid);

  document.getElementById("now").innerText =
    "NOW PLAYING: " + vid;
}

/* ---------------- CONTROLS ---------------- */
function nextVideo() {
  playNext();
}

function togglePlay() {
  if (player.getPlayerState() === 1) player.pauseVideo();
  else player.playVideo();
}

function toggleMute() {
  if (player.isMuted()) player.unMute();
  else player.mute();
}
</script>

</body>
</html>
