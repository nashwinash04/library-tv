<!DOCTYPE html>
<html>
<head>
  <title>Library TV</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #player {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    const videos = [
      "dQw4w9WgXcQ"
    ];

    async function loadChannelVideos() {
      const rssUrl =
        "https://www.youtube.com/feeds/videos.xml?channel_id=UC_O58Rr2DOskJvs9bArpLkQ";

      const response = await fetch(
        "https://api.rss2json.com/v1/api.json?rss_url=" +
        encodeURIComponent(rssUrl)
      );

      const data = await response.json();

      videos.length = 0;

      data.items.forEach(item => {
        const id = item.link.split("v=")[1];
        videos.push(id);
      });

      startPlayer();
    }

    let player;

    function randomVideo() {
      return videos[Math.floor(Math.random() * videos.length)];
    }

    function startPlayer() {
      player = new YT.Player("player", {
        videoId: randomVideo(),
        playerVars: {
          autoplay: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0
        },
        events: {
          onStateChange: e => {
            if (e.data === 0) {
              player.loadVideoById(randomVideo());
            }
          }
        }
      });
    }

    function onYouTubeIframeAPIReady() {
      loadChannelVideos();
    }
  </script>
</body>
</html>
